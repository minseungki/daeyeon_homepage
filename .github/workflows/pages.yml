name: Deploy Next.js (static export) to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    environment: github-pages
    defaults:
      run:
        working-directory: frontend   # ✅ 핵심: 모든 run을 frontend에서 실행

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json  # ✅ lock 파일 위치

      - name: Install
        run: npm ci

      - name: Build (export)
        run: npm run build
        env:
          GITHUB_PAGES: "true"
          NEXT_PUBLIC_BASE_PATH: "/daeyeon_homepage"
          NEXT_PUBLIC_KAKAO_APPKEY: ${{ secrets.NEXT_PUBLIC_KAKAO_APPKEY }}

      # GitHub Pages가 Jekyll 처리를 하면서 _next 같은 폴더를 건드리는 이슈 회피용
      - name: Add .nojekyll
        run: touch out/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/out   # ✅ export 결과물 위치

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4